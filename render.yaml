services:
  - type: web
    name: paid-community-platform
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && mkdir -p dist && cp -r ../frontend/dist/* dist/ 2>/dev/null || true
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        value: https://paid-community-platform.onrender.com
