services:
  - type: web
    name: paid-community-platform
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_JWT_SECRET
        generateValue: true
      - key: VITE_ADMIN_JWT_SECRET
        generateValue: true
      - key: VITE_PAYMENT_AMOUNT
        value: "120"
      - key: VITE_UPI_VPA
        sync: false
      - key: VITE_UPI_PAYEE_NAME
        value: Community
